name: APK

on:
  push:
    tags: ["v*"]

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build

      - name: Create fallback index.html for Capacitor
        run: |
          mkdir -p .output/public
          cat > .output/public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head><meta charset="utf-8"><title>Burning X</title></head>
            <body style="background:#0a0a0a;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
              <div>Loading Burning X...</div>
            </body>
          </html>
          EOF

      - name: Create local.properties
        run: |
          mkdir -p ~/.android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Write capacitor config with server URL
        run: |
          SERVER_URL="${{ vars.CAPACITOR_SERVER_URL }}"
          SERVER_URL="${SERVER_URL:-https://burning-x.direction-priority.win}"
          cat > capacitor.config.ts << EOF
          import type { CapacitorConfig } from "@capacitor/cli";
          const config: CapacitorConfig = {
            appId: "dev.burningx.app",
            appName: "Burning X",
            webDir: ".output/public",
            server: {
              url: "$SERVER_URL",
              cleartext: false,
            },
          };
          export default config;
          EOF

      - name: Sync Capacitor
        run: bunx cap sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             burning-x-${{ github.ref_name }}.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: burning-x-*.apk
          generate_release_notes: true
