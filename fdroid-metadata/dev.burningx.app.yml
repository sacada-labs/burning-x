Categories:
  - Sports & Health
License: MIT
SourceCode: https://github.com/sacada-labs/burning-x

RepoType: git
Repo: https://github.com/sacada-labs/burning-x.git

Builds:
  - versionName: '1.0.0'
    versionCode: 1
    commit: v1.0.0
    subdir: android/app
    init:
      - cd ../..
      - curl -fsSL https://bun.sh/install | bash
      - export PATH="$HOME/.bun/bin:$PATH"
      - bun install --frozen-lockfile
      - bunx cap sync
    gradle:
      - yes
    scandelete:
      - node_modules/

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: '1.0.0'
CurrentVersionCode: 1

# Optional: if you want F-Droid to publish your own signed APK instead of theirs
# Binaries: https://github.com/sacada-labs/burning-x/releases/v%v/burning-x-v%v.apk
# AllowedAPKSigningKeys: <sha256-fingerprint>
